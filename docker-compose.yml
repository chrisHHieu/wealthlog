services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wealthlog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wealthlog2026}
      POSTGRES_DB: wealthlog
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wealthlog"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-wealthlog}:${POSTGRES_PASSWORD:-wealthlog2026}@db:5432/wealthlog
      CORS_ORIGINS: '["http://localhost:3001","http://frontend:3001"]'
      DEBUG: ${DEBUG:-true}
    ports:
      - "8001:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3001:3000"

  db-backup:
    image: prodrigestivill/postgres-backup-local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: wealthlog
      POSTGRES_USER: ${POSTGRES_USER:-wealthlog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wealthlog2026}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 3
      HEALTHCHECK_PORT: 8080
    volumes:
      - ./backup:/backups

volumes:
  pgdata:
