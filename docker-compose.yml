services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wealthlog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wealthlog2026}
      POSTGRES_DB: ${POSTGRES_DB:-wealthlog}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wealthlog}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-wealthlog}:${POSTGRES_PASSWORD:-wealthlog2026}@db:5432/${POSTGRES_DB:-wealthlog}
      CORS_ORIGINS: '["http://localhost:3001","http://frontend:3001"]'
      DEBUG: ${DEBUG:-false}
      # ── AI Provider ───────────────────────────────────────────────────────
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      # ── Agent model ───────────────────────────────────────────────────────
      AGENT_MODEL: ${AGENT_MODEL:-claude-sonnet-4-6}
      AGENT_MAX_TOKENS: ${AGENT_MAX_TOKENS:-8000}
      AGENT_THINKING_ENABLED: ${AGENT_THINKING_ENABLED:-true}
      AGENT_THINKING_BUDGET: ${AGENT_THINKING_BUDGET:-8000}
      # ── Background models ─────────────────────────────────────────────────
      AGENT_REVIEW_MODEL: ${AGENT_REVIEW_MODEL:-claude-haiku-4-5-20251001}
      SESSION_SUMMARY_MODEL: ${SESSION_SUMMARY_MODEL:-claude-haiku-4-5-20251001}
      USER_MODEL_SYNTHESIS_MODEL: ${USER_MODEL_SYNTHESIS_MODEL:-claude-sonnet-4-6}
      # ── Context window ────────────────────────────────────────────────────
      AGENT_TOOL_RESULT_MAX_CHARS: ${AGENT_TOOL_RESULT_MAX_CHARS:-3000}
      AGENT_REVIEW_CADENCE: ${AGENT_REVIEW_CADENCE:-6}
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PORT: ${MCP_PORT:-8002}
    ports:
      - "8001:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3001:3000"

  db-backup:
    image: prodrigestivill/postgres-backup-local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-wealthlog}
      POSTGRES_USER: ${POSTGRES_USER:-wealthlog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wealthlog2026}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 3
      HEALTHCHECK_PORT: 8080
    volumes:
      - ./backup:/backups

volumes:
  pgdata:
